name: Build thesis PDF

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-latex:
    name: XeLaTeX build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Build thesis PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: template-ci.tex
          latexmk_use_xelatex: true
          args: "-pdf -file-line-error -interaction=nonstopmode -f"
          pre_compile: |
            sed \
              -e 's/Songti SC Light/FandolSong-Regular.otf/g' \
              -e 's/Songti SC Bold/FandolSong-Bold.otf/g' \
              -e 's/Heiti SC Light/FandolHei-Regular.otf/g' \
              -e 's/Heiti SC Medium/FandolHei-Bold.otf/g' \
              -e 's/KaiTi SC Bold/FandolKai-Regular.otf/g' \
              -e 's/KaiTi SC/FandolKai-Regular.otf/g' \
              template.tex > template-ci.tex
          post_compile: |
            latexmk -c template-ci.tex || true
      - name: Upload compiled PDF
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: template-ci.pdf
          if-no-files-found: error
